paths:
  /api/users:
    get:
      summary: Obtiene todos los usuarios
      tags:
        - Users
      responses:
        "200":
          description: Lista de usuarios obtenida correctamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  payload:
                    type: array
                    items:
                      $ref: '#/components/schemas/User'
        "500":
          description: Error interno del servidor

components:
  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
          description: ID del usuario generado por MongoDB
          example: "64a5f3c2e4b0f123456789ab"
        first_name:
          type: string
          description: Nombre del usuario
          example: "Lucas"
        last_name:
          type: string
          description: Apellido del usuario
          example: "García"
        email:
          type: string
          description: Email del usuario
          example: "lucas@email.com"
        password:
          type: string
          description: Contraseña encriptada con bcrypt
          example: "$2b$10$..."
        role:
          type: string
          enum: [user, admin]
          description: Rol del usuario
          example: "user"
        pets:
          type: array
          description: IDs de mascotas adoptadas
          items:
            type: string
          example: []